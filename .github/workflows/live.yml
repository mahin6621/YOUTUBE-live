name: 24/7 Forza Horizon 5 Live Stream

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Download Video from Drive
      run: |
        wget --load-cookies /tmp/cookies.txt "https://docs.google.com/uc?export=download&confirm=$(wget --quiet --save-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate 'https://docs.google.com/uc?export=download&id=1Ip7SzTSphdVEZBe1AIjaMy754agyo7Rh' -O- | sed -rn 's/.*confirm=([0-9A-Za-z_&=-]+).*/\1/p')&id=1Ip7SzTSphdVEZBe1AIjaMy754agyo7Rh" -O video.mp4 && rm -rf /tmp/cookies.txt

    - name: Start Live Stream
      run: |
        ffmpeg -re -stream_loop -1 -i video.mp4 \
        -c:v libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k \
        -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
        -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
